[pytest]
testpaths = tests
addopts = -ra
filterwarnings =
    ignore::DeprecationWarning
markers =
    slow: tests that exercise real algorithms at n=5000 (HDBSCAN sweep,
          dim-sweep runner). Default run includes them; skip with
          `pytest -m "not slow"` for fast iteration (~3 min instead of
          ~14 min).
