[pytest]
testpaths = tests
# -n auto: run the browser tier across CPU-count xdist workers. Each worker
# boots its own Chromium and rehydrates its own pages from the committed
# fixture zips (~1-2 s each), so parallelism is cheap now that nothing
# recomputes the pipeline. Requires pytest-xdist.
# --strict-markers: an unregistered/typo'd @pytest.mark.<x> is a hard error,
# not a silent warning. Matches the root biblion suite (pyproject.toml).
addopts = -ra -n auto --strict-markers
filterwarnings =
    ignore::DeprecationWarning
markers =
    slow: tests that exercise real algorithms at n=5000 (HDBSCAN sweep,
          dim-sweep runner). Default run includes them; skip with
          `pytest -m "not slow"` for fast iteration (~3 min instead of
          ~14 min).
    perf: tests asserting a timing or output-shape budget that can regress
          (distinct from `slow`, which is inherent algorithmic cost). Run
          on their own with `pytest -m perf`. Kept out of the fast path.
